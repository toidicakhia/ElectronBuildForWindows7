name: Build Cherry Studio (external)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout current repo
        uses: actions/checkout@v4

      - name: Clone Cherry Studio
        run: |
          git clone https://github.com/CherryHQ/cherry-studio.git
          cd cherry-studio

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: cherry-studio/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: cherry-studio
        run: pnpm i

      - name: Install electron@37.2.2
        working-directory: cherry-studio
        run: pnpm i electron@37.2.2

      - name: Build app
        working-directory: cherry-studio
        run: npm build:win:x64