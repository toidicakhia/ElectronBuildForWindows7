name: Build Cherry Studio (external)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout current repo
        uses: actions/checkout@v4

      - name: Clone Cherry Studio
        run: |
          git clone https://github.com/CherryHQ/cherry-studio.git

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10

      - name: Install dependencies (no scripts)
        working-directory: cherry-studio
        run: pnpm install

      - name: Install electron@37.2.2
        working-directory: cherry-studio
        run: pnpm add electron@37.2.2

      - name: Download custom electron@37.2.2
        run: curl -L https://github.com/e3kskoy7wqk/Electron-for-windows-7/releases/download/v37.2.2/dist.zip -o dist.zip

      - name: Unzip custom electron
        run: unzip dist.zip -d dist

      - name: Replace electron with custom version
        working-directory: cherry-studio
        run: |
          ELECTRON_PATH=$(Get-ChildItem -Recurse -Directory node_modules | Where-Object { $_.FullName -like "*electron@37.2.2*\\node_modules\\electron" } | Select-Object -First 1).FullName
          echo "Electron path: $ELECTRON_PATH"

          Remove-Item "$ELECTRON_PATH/dist" -Recurse -Force
          Move-Item ../dist "$ELECTRON_PATH/"

      - name: Build Cherry Studio
        working-directory: cherry-studio
        run: pnpm build:win:x64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cherry-studio-build
          path: cherry-studio/dist/win-unpacked/*.exe