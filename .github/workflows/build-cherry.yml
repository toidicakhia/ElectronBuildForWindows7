name: Build Cherry Studio (external)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout current repo
        uses: actions/checkout@v4

      - name: Clone Cherry Studio
        run: |
          git clone https://github.com/CherryHQ/cherry-studio.git
          cd cherry-studio

      - name: Install Node.js
        uses: actions/setup-node@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10

      - name: Install dependencies
        working-directory: cherry-studio
        run: pnpm i

      - name: Install electron@37.2.2
        working-directory: cherry-studio
        run: pnpm i electron@37.2.2

      - name: Download custom electron@37.2.2
        run: curl -L https://github.com/e3kskoy7wqk/Electron-for-windows-7/releases/download/v37.2.2/dist.zip -o dist.zip

      - name: Unzip custom electron
        run: unzip dist.zip -d dist

      - name: Replace electron with custom version
        working-directory: cherry-studio
        run: |
          ELECTRON_PATH=$(find node_modules -type d -path "*electron@37.2.2/node_modules/electron" | head -n 1)
          echo "Electron path: $ELECTRON_PATH"

          rm -rf "$ELECTRON_PATH/dist"
          mv ../dist "$ELECTRON_PATH/"

      - name: Build Cherry Studio
        working-directory: cherry-studio
        run: pnpm build:win:x64

      - name: Upload artifact
        uses: actions/upload-artifact@v3
        with:
          name: cherry-studio-build
          files: cherry-studio/dist/win-unpacked/*
