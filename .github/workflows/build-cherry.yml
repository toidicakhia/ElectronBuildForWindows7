name: Build Cherry Studio (external)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout current repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.11

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10

      - name: Clone Cherry Studio
        run: git clone https://github.com/CherryHQ/cherry-studio.git

      - name: Apply patches
        working-directory: cherry-studio
        run: git apply --ignore-space-change --ignore-whitespace ../patches/cherry-studio/0001-Patch-Cherry-Studio.patch

      - name: Install dependencies
        working-directory: cherry-studio
        run: pnpm i

      - name: Patch Electron
        run: python scripts/patch_electron.py cherry-studio
      
      - name: Patch shutdown handler
        run: python scripts/patch_shutdown_handler.py cherry-studio

      - name: Build Cherry Studio
        working-directory: cherry-studio
        run: pnpm build:win:x64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cherry-studio-build
          path: cherry-studio/dist/win-unpacked/*
